# Reviser checkpoints are available at:
# https://huggingface.co/sean-diab/reviser-checkpoints
# Download reviser_100m.pt and set this path accordingly.
model:
  name: reviser_100m
  family: reviser
  checkpoint: checkpoints/reviser_100m.pt
  d_model: 512
  n_heads: 8
  d_ff: 2048
  n_layers: 24
  vocab_size: 50291
data:
  prompt_prefix_tokens: 35
  max_canvas_length: 512
  dataset: c4_v2
training:
  seed: 123
  learning_rate: 1.0e-4
  min_learning_rate: 2.0e-5
decoding:
  temperature: 0.9
  top_k: 50
  total_max_actions: 256
  eor_logit_bias: 0.0
evaluation:
  scorer: gpt2_base
